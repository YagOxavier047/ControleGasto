version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: controlegasto-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Bot Python
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: controlegasto-bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - postgres

  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: controlegasto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-controlegasto}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  app-network:
    driver: bridge